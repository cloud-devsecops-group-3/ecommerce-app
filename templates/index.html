<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PageTurn Bookstore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📚 PageTurn Bookstore</span>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Available Products</h2>

    <div class="row">

        {% for product in products %}

        <div class="col-md-4 mb-4">

            <div class="card h-100 shadow-sm">

                <img
                    src="https://placehold.co/400x250?text={{ product.name }}"
                    class="card-img-top">

                <div class="card-body">

                    <h5>{{ product.name }}</h5>

                    <h4 class="text-primary">
                        ₱{{ product.price }}
                    </h4>

                </div>

                <div class="card-footer bg-white">

                    <!-- <form
                        action="/buy/{{ product.id }}"
                        method="POST">

                        <button
                            class="btn btn-success w-100">

                            Buy Now

                        </button>

                    </form> -->
                    <button
                        class="btn btn-success w-100 buy-btn"
                        data-product-id="{{ product.id }}">
                        Buy Now
                    </button>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Scan to Pay</h5>
                <button class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">

                <h4 id="modalProduct"></h4>

                <h5 id="modalAmount"></h5>

                <img id="modalQR"
                     width="260">

                <p class="mt-3">
                    Scan this QR using the Banking App.
                </p>

            </div>

        </div>
    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const modal = new bootstrap.Modal(
            document.getElementById("paymentModal")
        );

        document.querySelectorAll(".buy-btn").forEach(button => {

            button.addEventListener("click", async () => {

                const id = button.dataset.productId;

                const response = await fetch("/buy/" + id, {
                    method: "POST"
                });

                const data = await response.json();

                document.getElementById("modalProduct").textContent =
                    data.product;

                document.getElementById("modalAmount").textContent =
                    "₱" + Number(data.amount).toFixed(2);

                document.getElementById("modalQR").src =
                    data.qr;

                modal.show();

            });

        });

    });
</script>
</html>
